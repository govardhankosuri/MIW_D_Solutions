<!DOCTYPE html>
<html>
    <head>
        <title>SignUp Page</title>
        <style>
            .menu {
                width:100%;
                background-color: rgba(0,0,0,0.3);
                padding: 15px 40px;
                position: fixed;
                top:0;
                left:0;
                box-sizing: border-box;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .menu ul {
                list-style: none;
                display: flex;
                justify-content: flex-end;
                gap:30px;
                margin:0;
                padding:0;
            
            }

            .menu ul a {
                color:white;
                text-decoration: none;
                font-size: 16px;
                font-weight: 600;
                transition: 0.3s;
            }

            .menu ul a:hover {
                color:#ffcc00;
            }

            .logo {
                display: flex;
                align-items: center;
                gap:10px;

            }

            .logo img {
                width: 60px;
                height: 60px;
            }

            .logo h2{
                color:white;
                font-size: 20px;
                margin: 0;
            }

            * {
                margin:0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, Helvetica, sans-serif;
            }

            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding-top: 0;
                margin: -30;
            }

            .login-box {
                background: rgba(255,255,255,0.15);
                margin-top: 80px;
                border-radius: 12px;
                width: 400px;
                backdrop-filter: blur(10px);
                color: white;
            }

            .login-box h2 {
                text-align: center;
                margin-bottom: 5px;
            }

            .login-box p {
                text-align: center;
                margin-bottom: 15px;
                font-size: 14px;
            }

            .input-group {
                margin-bottom: 10px;
            }

            .input-group label {
                display: block;
                font-size: 15px;
                margin-bottom: 5px;
                font-weight: 600;
            }

            .input-group input {
                width: 100%;
                padding: 5px;
                font-size: 14px;
                border: 2px solid white;
                border-radius: 8px;
                background-color: rgba(255,255,255,0.9);
                outline: none;
            }

            .btn {
                width:100%;
                padding:15px;
                font-size: 18px;
                font-weight: bold;
                background-color: white;
                color:#667eea;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                margin-top: 5px;
                
            }

            .btn:hover {
                background-color: #ffcc00;
                color:#000;

            }

            .link {
                text-align: center;
                margin-top:20px;
                font-size: 14px;
            }

            .link a {
                color: #ffcc00;
                text-decoration: none;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
       
    
         <div class="menu">
             <div class="logo">
        <img src="miw logo.png" rel="stylesheet">
        <h2>MIW Dgital Services</h2>
        </div>
                <ul>
            <a href="index.html">HOME </a>
            <a href="aboutus.html">ABOUT US</a>
            <a href="seo.html">SERVICES</a>
            <a href="case.html">CASE STUDIES</a>
            <a href="blog.html">BLOGS</a>
            <a href="contact.html">CONTACT</a>
            <a href="login.html">LOGIN</a>
            <a href="signup.html">SIGN UP</a>
            </ul>
            </div>
        <div class="login-box">
            <h2>Create Account</h2>
            <p>Join MIW Digital Service Today</p>

            <form id="signupForm">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="enter your name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="enter your email" required>
                </div>

                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="number" placeholder="enter your number" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="create your password" required>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="confirm password" required>
                </div>

                <button type="submit" class="btn">SignUp</button>
                
            </form>

            <div class="link">Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
        <script>
            document.getElementById('signupForm').addEventListener('submit', function(e){
                e.preventDefault();
                alert('Account Created Successfully');

                window.location.href="login.html";
            });
        </script>
    </body>
</html>
